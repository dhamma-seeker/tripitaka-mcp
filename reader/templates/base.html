<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tripitaka Reader{% endblock %}</title>
  <link rel="icon" href="/read/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/read/static/style.css?v=5">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <a href="/read/" class="brand">Tripiṭaka <span class="brand-sub">— bilingual reader</span></a>
    <form action="/read/search" method="get" class="search-mini" role="search">
      <input
        type="search"
        name="q"
        placeholder="Search…"
        aria-label="Search"
        minlength="3"
        maxlength="200"
        autocomplete="off"
        spellcheck="false"
      >
    </form>
    <nav class="site-nav">
      {% if request and request.url.path != '/read/' %}<a href="/read/">Browse</a>{% endif %}
      <a href="/" rel="external">Home</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>
      Source: <a href="https://suttacentral.net/" rel="external">SuttaCentral bilara-data</a> (CC0).
      Pāli + English (Bhikkhu Sujato / Bhikkhu Brahmali).
      Offered as <em>Dhamma Dāna</em>.
    </p>
  </footer>
  <div id="word-popup" class="word-popup" hidden role="dialog" aria-label="Word definition">
    <div class="wp-head">
      <span class="wp-word" id="wp-word"></span>
      <button type="button" class="wp-close" aria-label="Close">×</button>
    </div>
    <div class="wp-body" id="wp-body"></div>
  </div>
  <script>
    // Hash navigation: scroll the targeted segment to viewport center
    // (default browser behavior pins it at the top — "focus" reads better
    // when centered). Runs once on initial load and on hashchange.
    (function () {
      function focusHash() {
        if (!location.hash) return;
        var id = decodeURIComponent(location.hash.slice(1));
        var el = document.getElementById(id);
        if (!el) return;
        // Defer one frame so layout/font load doesn't fight the scroll.
        requestAnimationFrame(function () {
          el.scrollIntoView({ behavior: 'instant', block: 'center' });
        });
      }
      focusHash();
      window.addEventListener('hashchange', focusHash);
    })();

    // Word tooltip — double-click any Pāli word to see dictionary definitions.
    // Activates only inside .text-pali; English text is left alone (most users
    // already know it). Looks up via /read/api/word, displays a popup card
    // anchored to the click position, dismissed on click-outside or ESC.
    (function () {
      var popup = document.getElementById('word-popup');
      var wpWord = document.getElementById('wp-word');
      var wpBody = document.getElementById('wp-body');
      var closeBtn = popup ? popup.querySelector('.wp-close') : null;
      if (!popup) return;

      function escapeHtml(s) {
        return (s || '').replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function hide() { popup.hidden = true; }

      function show(x, y, word, defs) {
        wpWord.textContent = word;
        if (!defs || !defs.length) {
          wpBody.innerHTML = '<p class="wp-empty">No dictionary entry found. The word may be inflected — try the stem (e.g. <code>appamāda</code> instead of <code>appamādo</code>).</p>';
        } else {
          wpBody.innerHTML = defs.map(function (d) {
            return '<div class="wp-def">' +
              '<div class="wp-source">' + escapeHtml(d.source) + ' <span class="wp-lang">(' + escapeHtml(d.language) + ')</span></div>' +
              '<div class="wp-text">' + escapeHtml(d.text) + '</div>' +
              '</div>';
          }).join('');
        }
        popup.hidden = false;
        // Position: try to fit within viewport; clamp to 12px from edges.
        var pw = popup.offsetWidth, ph = popup.offsetHeight;
        var vw = window.innerWidth, vh = window.innerHeight;
        var px = Math.max(12, Math.min(x, vw - pw - 12));
        var py = Math.max(12, Math.min(y + 16, vh - ph - 12));
        popup.style.left = px + 'px';
        popup.style.top = py + 'px';
      }

      document.addEventListener('dblclick', function (e) {
        if (!e.target.closest('.text-pali')) return;
        var sel = window.getSelection();
        var raw = (sel && sel.toString() || '').trim();
        // Strip leading/trailing punctuation but keep diacritics.
        var word = raw.replace(/^[\p{P}\p{S}]+|[\p{P}\p{S}]+$/gu, '');
        if (!word || word.length < 2 || word.length > 60) return;
        // Fetch and show. Lowercase before sending — server lowercases too,
        // but matching the cache key here helps repeat-click latency.
        fetch('/read/api/word?w=' + encodeURIComponent(word.toLowerCase()))
          .then(function (r) { return r.json(); })
          .then(function (data) { show(e.clientX, e.clientY, word, data.definitions); })
          .catch(function () { /* ignore network errors silently */ });
      });

      if (closeBtn) closeBtn.addEventListener('click', hide);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !popup.hidden) hide();
      });
      document.addEventListener('click', function (e) {
        if (popup.hidden) return;
        if (popup.contains(e.target)) return;
        if (e.target.closest('.text-pali')) return; // dblclick handler will reposition
        hide();
      });
    })();

    // Citation copy button on sutta pages.
    // data-cite-base = "{sutta_id}|{title_pali}|{title_english}|{nikaya_pali}"
    // If the URL has a #segment hash, we append it so academic citations
    // can pinpoint the line. Format aims to be both human-readable AND
    // a working URL when pasted bare into chat/email.
    (function () {
      var btn = document.querySelector('.cite-btn');
      if (!btn || !navigator.clipboard) return;
      btn.addEventListener('click', function () {
        var parts = (btn.dataset.citeBase || '').split('|');
        var sid = parts[0], titlePi = parts[1], titleEn = parts[2], nik = parts[3];
        var origin = window.location.origin || 'https://tripitaka-mcp.com';
        var url = origin + '/read/' + sid;
        var hash = location.hash ? location.hash.slice(1) : '';
        var segNote = '';
        if (hash) { url += '#' + hash; segNote = ', segment ' + hash; }
        var label = titleEn ? titlePi + ' (' + titleEn + ')' : titlePi;
        var text = label + ' [' + sid.toUpperCase() + ', ' + nik + segNote + '] — ' + url;
        navigator.clipboard.writeText(text).then(function () {
          var orig = btn.textContent;
          btn.textContent = 'Copied ✓';
          btn.classList.add('cite-btn-ok');
          setTimeout(function () {
            btn.textContent = orig;
            btn.classList.remove('cite-btn-ok');
          }, 1600);
        });
      });
    })();
  </script>
</body>
</html>
