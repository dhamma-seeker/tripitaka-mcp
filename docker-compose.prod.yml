# =============================================================================
# Tripitaka MCP Server — Production Compose
# =============================================================================
# สำหรับ deploy บน production server เท่านั้น
# - ไม่ expose DB port ออกนอก Docker network
# - ไม่มี bind mount source (ใช้ code จาก image)
# - มี resource limits, read-only filesystem, no-new-privileges
# - อ่าน secret จาก .env (หรือ Docker secrets)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# ก่อน deploy:
#   1. สร้าง .env บน server ด้วย POSTGRES_PASSWORD ที่ random แข็งแรง
#   2. chmod 600 .env
#   3. วาง reverse proxy (Caddy/Traefik) หน้า mcp-server + TLS + auth

services:
  # --------------------------------------------------------------------------
  # PostgreSQL + pgvector (internal only)
  # --------------------------------------------------------------------------
  db:
    image: ankane/pgvector:latest
    container_name: tripitaka-db
    # ไม่มี ports: — คุยกันภายใน Docker network เท่านั้น
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # MCP Server (production)
  # --------------------------------------------------------------------------
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: tripitaka-mcp:${APP_VERSION:-latest}
    container_name: tripitaka-mcp-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ใช้ readonly user (ตั้งค่าผ่าน scripts/setup_readonly_user.sql)
      # TRIPITAKA_RO_PASSWORD ต้องมีใน .env — ไม่ fallback
      DATABASE_URL: postgresql://tripitaka_ro:${TRIPITAKA_RO_PASSWORD:?TRIPITAKA_RO_PASSWORD must be set}@db:5432/${POSTGRES_DB}
      # ข้าม create_tables() — runtime เป็น readonly ไม่มีสิทธิ์ DDL
      TRIPITAKA_SKIP_MIGRATIONS: "true"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-sse}
      MCP_HOST: ${MCP_HOST:-127.0.0.1}
      MCP_PORT: ${MCP_PORT:-8080}
    # expose เฉพาะ internal — ให้ reverse proxy เข้าถึง
    expose:
      - "8080"
    # ถ้าต้องให้ proxy บน host ถึง ใช้ 127.0.0.1 bind เท่านั้น
    # ports:
    #   - "127.0.0.1:8080:8080"
    volumes:
      # HOME ของ user app = /app (ดู Dockerfile: --home /app)
      # volume mount override read_only:true เฉพาะ path นี้ ให้ HF download cache ได้
      - model_cache:/app/.cache
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Alert Bridge — webhook → Telegram forwarder
  # --------------------------------------------------------------------------
  # รับ webhook จาก UptimeRobot + DigitalOcean แล้ว forward เข้า Telegram
  # Internal only — เข้าถึงผ่าน Caddy ที่ path /webhooks/* เท่านั้น
  alert-bridge:
    build:
      context: ./alert_bridge
      dockerfile: Dockerfile
    image: tripitaka-alert-bridge:${APP_VERSION:-latest}
    container_name: tripitaka-alert-bridge
    environment:
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:?TG_BOT_TOKEN must be set}
      TG_CHAT_ID: ${TG_CHAT_ID:?TG_CHAT_ID must be set}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?WEBHOOK_SECRET must be set}
    expose:
      - "9090"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Caddy reverse proxy + TLS + rate limit
  # --------------------------------------------------------------------------
  # ผู้ใช้ที่มี Cloudflare อยู่หน้า: ตั้ง DNS proxy + Cloudflare rate limit
  # rule (ชั้นแรก) ควบคู่กับ Caddy rate_limit (ชั้นสองในเครื่อง)
  caddy:
    build:
      context: ./infra
      dockerfile: Dockerfile.caddy
    image: tripitaka-caddy:${APP_VERSION:-latest}
    container_name: tripitaka-caddy
    depends_on:
      - mcp-server
      - alert-bridge
    environment:
      TRIPITAKA_DOMAIN: ${TRIPITAKA_DOMAIN:?TRIPITAKA_DOMAIN must be set (eg. mcp.example.org)}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  model_cache:
  caddy_data:
  caddy_config:
