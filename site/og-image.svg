<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- background -->
  <rect width="1200" height="630" fill="#fafaf7"/>

  <!-- gold top accent -->
  <rect x="0" y="0" width="1200" height="8" fill="#8b6914"/>

  <!-- T mark, matches favicon style -->
  <g transform="translate(96, 156)">
    <rect width="92" height="92" rx="16" fill="#8b6914"/>
    <text x="46" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="600" fill="#fafaf7" text-anchor="middle">T</text>
  </g>

  <!-- main title -->
  <text x="216" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="84" font-weight="600" fill="#1c1c1c" letter-spacing="-2">Tripitaka MCP</text>

  <!-- subtitle -->
  <text x="216" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="34" fill="#6b6b6b">Pāli Canon for AI assistants</text>

  <!-- coverage line -->
  <text x="96" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" fill="#1c1c1c" font-weight="500">~444,000 segments  ·  Sutta  ·  Vinaya  ·  Abhidhamma</text>

  <!-- Pāli aspiration (Roman script — Thai virama renders unreliably across crawler font stacks) -->
  <text x="600" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="24" fill="#8b6914" font-style="italic" text-anchor="middle">— Idaṃ me puññaṃ sabbasattānaṃ demi —</text>

  <!-- footer left -->
  <text x="96" y="558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" fill="#6b6b6b">tripitaka-mcp.com</text>

  <!-- footer right -->
  <text x="1104" y="558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" fill="#8b6914" font-weight="500" text-anchor="end">Offered as Dhamma Dāna</text>
</svg>
