# =============================================================================
# Tripitaka MCP Server — Development Compose
# =============================================================================
# ใช้สำหรับ local dev เท่านั้น — มี bind mount source + expose DB port ให้ดีบัก
# สำหรับ production ให้ใช้ docker-compose.prod.yml
#
# Usage:
#   cp .env.example .env   # แล้วแก้ POSTGRES_PASSWORD ให้ไม่ใช่ค่า default
#   docker compose up -d

services:
  # --------------------------------------------------------------------------
  # PostgreSQL + pgvector
  # --------------------------------------------------------------------------
  db:
    image: ankane/pgvector:latest
    container_name: tripitaka-db
    ports:
      - "127.0.0.1:5432:5432"    # bind localhost เท่านั้น (ไม่เปิด LAN)
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tripitaka_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-tripitaka_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # MCP Server (dev mode — hot reload via bind mount)
  # --------------------------------------------------------------------------
  mcp-server:
    build: .
    container_name: tripitaka-mcp-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-tripitaka_db}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-stdio}
    volumes:
      - .:/app                    # dev only — อย่าใช้บน prod
      - model_cache:/home/app/.cache
    stdin_open: true
    tty: true

volumes:
  model_cache:
