<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripitaka Audit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body class="bg-[#0a0a0c] text-slate-200 min-h-screen pb-12" x-data="dashboard()">

    <!-- Header -->
    <header class="sticky top-0 z-50 glass py-4 px-8 flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-black font-bold text-xl">🔱</div>
            <h1 class="text-2xl font-semibold tracking-tight">Audit Dashboard</h1>
        </div>
        <div class="flex gap-6 items-center">
            <div class="text-xs text-slate-400">STATUS: <span class="text-green-400 font-mono">AGENT OPERATIONAL</span></div>
            <div class="h-8 w-[1px] bg-slate-800"></div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span>
                <span class="text-sm font-medium">Tripitaka Phase 3</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-8">
        
        <!-- Stats Hero -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute -right-4 -bottom-4 text-8xl opacity-[0.03] group-hover:scale-110 transition-transform">📜</div>
                <div class="text-sm text-slate-400 mb-2 uppercase tracking-widest font-semibold">Total Progress</div>
                <div class="text-5xl font-bold text-amber-500 mb-2" x-text="`${overallProgress}%` || '0%' "></div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div class="bg-amber-500 h-full" :style="`width: ${overallProgress}%` "></div>
                </div>
            </div>
            
            <div class="glass p-6 rounded-2xl">
                <div class="text-sm text-slate-400 mb-2 uppercase tracking-widest font-semibold">Active Batches</div>
                <div class="text-5xl font-bold text-blue-400 mb-2" x-text="activeCount || 0"></div>
                <div class="text-xs text-slate-500 italic">Across all 45 volumes</div>
            </div>

            <div class="glass p-6 rounded-2xl border-l-4 border-amber-600">
                <div class="text-sm text-slate-400 mb-2 uppercase tracking-widest font-semibold">Budget Used</div>
                <div class="text-5xl font-bold text-slate-200 mb-2">$3.51</div>
                <div class="text-xs text-green-500 font-mono">~126.36 THB (SAFE)</div>
            </div>
        </div>

        <!-- Volume Grid -->
        <template x-for="pitaka in pitakaGroups" :key="pitaka">
            <div class="mb-12">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-3">
                    <span class="w-1.5 h-6 bg-amber-500 rounded-full"></span>
                    <span x-text="pitaka"></span>
                </h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-9 gap-4">
                    <template x-for="vol in stats.filter(s => s.pitaka_name === pitaka)" :key="vol.thai_volume">
                        <button 
                            @click="viewVolume(vol.thai_volume)"
                            class="glass rounded-xl p-4 flex flex-col justify-between hover:border-amber-500 transition-all group relative overflow-hidden border border-transparent"
                            :class="getVolStatusClass(vol.thai_volume)"
                        >
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-bold text-slate-500 group-hover:text-amber-500" x-text="`VOL ${vol.thai_volume}`"></span>
                                <span class="text-[8px] px-1.5 py-0.5 rounded bg-white/5 text-slate-400" x-text="vol.nikaya_name"></span>
                            </div>
                            
                            <div class="flex flex-col items-center my-2">
                                <div class="text-2xl font-bold mb-1" x-text="vol.progress_pct + '%'"></div>
                                <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                    <div class="h-full bg-amber-500/50" :style="`width: ${vol.progress_pct}%` "></div>
                                </div>
                            </div>

                            <div class="text-[10px] text-slate-500 flex justify-between w-full">
                                <span x-text="vol.done"></span>
                                <span>/</span>
                                <span x-text="vol.total_batches"></span>
                            </div>
                        </button>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <script>
        function dashboard() {
            return {
                stats: [],
                pitakaGroups: [],
                overallProgress: 0,
                activeCount: 0,
                async init() {
                    const res = await fetch('/stats');
                    this.stats = await res.json();
                    this.calculateOverall();
                    this.pitakaGroups = [...new Set(this.stats.map(s => s.pitaka_name))];
                },
                calculateOverall() {
                    if (this.stats.length === 0) return;
                    let totalDone = 0;
                    let totalItems = 0;
                    this.stats.forEach(s => {
                        totalDone += s.done;
                        totalItems += s.total_batches;
                        if (s.drafting > 0 || s.review > 0) this.activeCount++;
                    });
                    this.overallProgress = totalItems > 0 ? Math.round((totalDone / totalItems) * 100) : 0;
                },
                getVolStats(vol) {
                    return this.stats.find(s => s.thai_volume === vol) || { done: 0, total_batches: 0, progress_pct: 0 };
                },
                getVolProgress(vol) {
                    return this.getVolStats(vol).progress_pct;
                },
                getVolDoneCount(vol) {
                    return this.getVolStats(vol).done;
                },
                getVolTotal(vol) {
                    return this.getVolStats(vol).total_batches;
                },
                getVolStatusClass(vol) {
                    const s = this.getVolStats(vol);
                    if (s.done > 0 && s.done === s.total_batches) return 'border-green-500/50 bg-green-500/5';
                    if (s.progress_pct > 0) return 'border-amber-500/30 bg-amber-500/5';
                    return '';
                },
                viewVolume(vol) {
                    window.location.href = `/volumes/${vol}`;
                }
            }
        }
    </script>
</body>
</html>
