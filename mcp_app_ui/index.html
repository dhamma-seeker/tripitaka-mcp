<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tipiṭaka — Sutta Viewer</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 16px;
    font: 15px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: transparent;
  }
  .header { margin-bottom: 10px; }
  .header .ref { font-size: 13px; opacity: 0.6; letter-spacing: 0.03em; }
  .header .title { font-size: 18px; font-weight: 600; margin-top: 2px; }
  #chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 0 12px; }
  .chip {
    font: inherit; font-size: 12px; padding: 3px 12px; cursor: pointer;
    border-radius: 999px; border: 1px solid rgba(127,127,127,0.35);
    background: transparent; color: inherit; opacity: 0.75;
  }
  .chip.on {
    background: rgba(83,74,183,0.12); border-color: rgba(83,74,183,0.55);
    opacity: 1; font-weight: 600;
  }
  .seg {
    padding: 8px 10px; border-radius: 8px;
    border-left: 3px solid transparent;
  }
  .seg + .seg { margin-top: 2px; }
  .seg:hover { background: rgba(127,127,127,0.07); }
  .seg.target {
    background: rgba(214,158,46,0.14);
    border-left-color: #d69e2e;
    border-radius: 0;
  }
  .sid { font-size: 11px; opacity: 0.4; margin-bottom: 2px; }
  .pali { font-style: italic; }
  .en { opacity: 0.92; margin-top: 2px; }
  .tr-row {
    display: flex; gap: 8px; align-items: flex-start;
    background: rgba(29,158,117,0.10); border-radius: 6px;
    padding: 6px 10px; margin-top: 6px;
  }
  .tr-badge {
    font-size: 10px; font-weight: 600; white-space: nowrap;
    border: 1px solid rgba(29,158,117,0.5); border-radius: 4px;
    padding: 1px 5px; margin-top: 4px; opacity: 0.85;
  }
  .tr-text { line-height: 1.6; }
  .tr-missing {
    display: flex; gap: 8px; align-items: center;
    border: 1px dashed rgba(127,127,127,0.4); border-radius: 6px;
    padding: 5px 10px; margin-top: 6px;
  }
  .tr-missing-label { font-size: 12px; opacity: 0.55; }
  .tr-btn {
    font: inherit; font-size: 12px; padding: 3px 10px; cursor: pointer;
    margin-left: auto; border-radius: 6px;
    border: 1px solid rgba(127,127,127,0.35); background: transparent; color: inherit;
  }
  .tr-btn:hover { background: rgba(127,127,127,0.1); }
  #footer {
    margin-top: 14px; padding-top: 10px; font-size: 12px; opacity: 0.65;
    border-top: 1px solid rgba(127,127,127,0.25); line-height: 1.5;
  }
  .footer-translate { display: flex; gap: 8px; align-items: center; }
  .footer-translate .tr-btn { margin-left: auto; }
  .poc-note {
    margin-top: 12px; padding: 8px 12px; border-radius: 8px;
    background: rgba(127,127,127,0.08); font-size: 12px; opacity: 0.7;
  }
  /* dictionary popover */
  .dict-popover {
    position: fixed; z-index: 100;
    background: Canvas; color: CanvasText;
    border: 1px solid rgba(127,127,127,0.28);
    border-radius: 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.20);
    width: 360px; max-height: 420px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .dict-hdr {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 12px 8px;
    border-bottom: 1px solid rgba(127,127,127,0.2);
    flex-shrink: 0;
  }
  .dict-hw { font-style: italic; font-weight: 700; font-size: 16px; flex: 1; }
  .dict-stem-note { font-size: 11px; opacity: 0.5; }
  .dict-close {
    font: inherit; font-size: 18px; line-height: 1; padding: 0 2px;
    border: none; background: transparent; cursor: pointer; opacity: 0.45; color: inherit;
  }
  .dict-close:hover { opacity: 1; }
  .dict-body { flex: 1; overflow-y: auto; padding: 10px 14px 12px; }
  .dict-def + .dict-def {
    margin-top: 10px; border-top: 1px solid rgba(127,127,127,0.15); padding-top: 10px;
  }
  .dict-src {
    display: inline-block; font-size: 10px; font-weight: 600;
    border: 1px solid rgba(127,127,127,0.4); border-radius: 4px;
    padding: 1px 5px; margin-bottom: 4px; opacity: 0.7;
  }
  .dict-txt { font-size: 13px; line-height: 1.55; white-space: pre-wrap; }
  .dict-morph {
    margin-top: 8px; padding-top: 7px;
    border-top: 1px solid rgba(127,127,127,0.15);
    font-size: 11px; opacity: 0.6;
  }
  .dict-morph-label { font-weight: 600; }
  .dict-msg { font-size: 13px; opacity: 0.6; padding: 2px 0; }
  .dict-err { color: #c0392b; opacity: 1; }
  .pali { cursor: text; }
</style>
</head>
<body>
  <div class="header" style="display:flex; align-items:flex-start; gap:12px;">
    <div style="flex:1; min-width:0;">
      <div class="ref" id="ref"></div>
      <div class="title" id="title"></div>
    </div>
    <div id="header-actions"></div>
  </div>
  <div id="chips"></div>
  <div id="segments"></div>
  <div id="footer" style="display:none"></div>
  <div class="poc-note" id="status">Loading…</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
